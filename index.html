<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WARDEN — Sticker Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;500;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
:root {
  --navy:  #0b0f1a;
  --navy2: #0e1420;
  --navy3: #141b2d;
  --cyan:  #00d4ff;
  --gold:  #c9a84c;
  --gold3: #f5d98a;
  --white: #e8eaf0;
  --muted: #4a5568;
  --muted2:#2d3748;
  --purple:#a855f7;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--navy);color:var(--white);font-family:'Rajdhani',sans-serif;overflow-x:hidden;min-height:100vh;}
a{text-decoration:none;color:inherit;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--navy);}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px;}

/* GRAIN */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.3;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E");
}

/* GRID BG */
.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(0,212,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.025) 1px,transparent 1px);
  background-size:40px 40px;}

/* SCANLINE */
.scanline{position:fixed;left:0;right:0;height:2px;pointer-events:none;z-index:9998;
  background:linear-gradient(to right,transparent,rgba(0,212,255,0.07),transparent);
  animation:scan 10s linear infinite;}
@keyframes scan{0%{top:-2px;}100%{top:100vh;}}

/* HEADER */
header{
  position:relative;z-index:10;
  padding:56px 24px 48px;text-align:center;
  background:linear-gradient(to bottom, rgba(11,15,26,1) 60%, transparent);
}
.header-pre{
  font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--cyan);letter-spacing:4px;text-transform:uppercase;
  margin-bottom:14px;opacity:0.7;
}
.header-title{
  font-family:'Orbitron',monospace;font-size:clamp(32px,8vw,64px);
  font-weight:900;letter-spacing:6px;
  background:linear-gradient(135deg,var(--gold3),var(--gold) 45%,var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.1;margin-bottom:12px;
}
.header-sub{
  font-size:13px;color:var(--muted);letter-spacing:2px;
  font-family:'JetBrains Mono',monospace;text-transform:uppercase;
  margin-bottom:20px;
}
.header-sub span{color:var(--purple);}
.count-badge{
  display:inline-block;padding:5px 16px;
  border:1px solid rgba(201,168,76,0.3);border-radius:2px;
  font-size:11px;font-family:'JetBrains Mono',monospace;
  color:var(--gold);background:rgba(201,168,76,0.06);letter-spacing:2px;
}

/* DIVIDER */
.divider{height:1px;background:linear-gradient(to right,transparent,var(--gold),var(--cyan),transparent);margin:0 24px 48px;opacity:0.15;}

/* MASONRY */
.gallery{
  position:relative;z-index:1;
  padding:0 16px 80px;
  columns:2;column-gap:14px;
}
@media(min-width:600px){.gallery{columns:3;column-gap:16px;}}
@media(min-width:900px){.gallery{columns:4;column-gap:18px;max-width:1100px;margin:0 auto;}}

/* CARD */
.card{
  break-inside:avoid;
  margin-bottom:14px;
  border:1px solid var(--muted2);
  border-radius:6px;overflow:hidden;
  background:var(--navy3);
  transition:border-color 0.25s, transform 0.25s, box-shadow 0.25s;
  position:relative;
}
.card:hover{
  border-color:var(--gold);
  transform:translateY(-3px);
  box-shadow:0 8px 32px rgba(201,168,76,0.12);
}

/* top shimmer on hover */
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(to right,transparent,var(--gold),var(--cyan),transparent);
  opacity:0;transition:opacity 0.25s;z-index:2;
}
.card:hover::before{opacity:1;}

.card-img-wrap{position:relative;overflow:hidden;}
.card-img-wrap img{
  width:100%;display:block;
  transition:transform 0.35s;
}
.card:hover .card-img-wrap img{transform:scale(1.04);}

/* OVERLAY */
.card-overlay{
  position:absolute;inset:0;
  background:rgba(11,15,26,0.75);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.25s;
}
.card:hover .card-overlay{opacity:1;}

.dl-btn{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:12px 20px;
  border:1px solid var(--cyan);border-radius:4px;
  background:rgba(0,212,255,0.1);
  color:var(--cyan);font-family:'JetBrains Mono',monospace;
  font-size:11px;letter-spacing:2px;text-transform:uppercase;
  transition:background 0.2s,transform 0.2s;cursor:pointer;
}
.dl-btn:hover{background:rgba(0,212,255,0.2);transform:scale(1.05);}
.dl-icon{font-size:22px;line-height:1;}

/* CARD FOOTER */
.card-footer{
  padding:8px 12px;
  display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid var(--muted2);
}
.card-name{font-size:11px;color:var(--white);font-weight:600;letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:75%;}
.card-num{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;flex-shrink:0;}

/* FOOTER */
footer{
  position:relative;z-index:1;
  text-align:center;padding:28px 24px;
  border-top:1px solid var(--muted2);
}
.footer-text{font-size:10px;color:var(--muted);letter-spacing:2px;font-family:'JetBrains Mono',monospace;}
.footer-text span{color:var(--gold);}

/* FADE IN CARDS */
.card{opacity:0;animation:fadeUp 0.5s ease forwards;}
.card:nth-child(1){animation-delay:0.00s;}.card:nth-child(2){animation-delay:0.04s;}.card:nth-child(3){animation-delay:0.08s;}.card:nth-child(4){animation-delay:0.12s;}.card:nth-child(5){animation-delay:0.16s;}.card:nth-child(6){animation-delay:0.20s;}.card:nth-child(7){animation-delay:0.24s;}.card:nth-child(8){animation-delay:0.28s;}.card:nth-child(9){animation-delay:0.32s;}.card:nth-child(10){animation-delay:0.36s;}.card:nth-child(11){animation-delay:0.40s;}.card:nth-child(12){animation-delay:0.44s;}.card:nth-child(13){animation-delay:0.48s;}.card:nth-child(14){animation-delay:0.52s;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
